<!DOCTYPE html>
<html>
<head>
  <title>Stream → Download</title>
</head>
<body style="text-align:center;font-family:Arial;background:#111;color:white;padding:40px;">

<h2>Stream Link Converter</h2>

<input id="url" style="width:80%;padding:10px;" placeholder="Paste stream link" />
<br><br>

<button onclick="go()">Generate Download Link</button>

<p id="out"></p>

<script>
async function go() {
  const url = document.getElementById("url").value;

  const res = await fetch(`/api/convert?url=${encodeURIComponent(url)}`);
  const data = await res.json();

  document.getElementById("out").innerHTML =
    `<a style="color:lime" href="${data.link}">⬇ Download File</a>`;
}
</script>

</body>
</html>
