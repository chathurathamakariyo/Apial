<!DOCTYPE html>
<html>
<head>
  <title>Stream Converter</title>
</head>
<body style="text-align:center;font-family:Arial;background:#111;color:white;padding:40px;">

<h2>Stream → Download Link</h2>

<input id="url" style="width:80%;padding:10px;" placeholder="Paste stream link" />
<br><br>

<button onclick="go()">Generate Link</button>

<p id="out"></p>

<script>
async function go() {
  const url = document.getElementById("url").value;

  const res = await fetch(`/api/convert?url=${encodeURIComponent(url)}`);
  const data = await res.json();

  document.getElementById("out").innerHTML =
    `⬇ <a style="color:lime" target="_blank" href="${data.link}">
      Click Download Link
    </a>`;
}
</script>

</body>
</html>
